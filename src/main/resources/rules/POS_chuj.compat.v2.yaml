gloss_map:
  pos:
    - {"DIR": "PART"}
    - {"PREP": "ADP"}
    - {"ADV": "ADV"}
    - {"Pro3": "DET"}
    - {"CLF": "DET"}
    - {"NUM": "NUM"}
    - {"APV": "PART"}
    - {"DST": "DET"}
    - {"SR": "ADP"}
    - {"EXIST": "PART"}
    - {"ÉNF": "PART"}
    - {"COMP": "SCONJ"}
    - {"NEX": "SCONJ"}
    - {"COND": "SCONJ"}
    - {"INTJ": "INTJ"}
    - {"VI": "VERB"}
    - {"VT": "VERB"}
  feats:
    - {"PFV": {"Aspect": "Perf"}}
    - {"IPFV": {"Aspect": "Imp"}}
    - {"NEG": {"Polarity": "Neg"}}
    - {"PL": {"Number": "Plur"}}
    - {"DST": {"PronType": "Dem"}}
    - {"SEC": {"Mood": "Seq"}}
    - {"PRSP": {"Aspect": "Prosp"}}
    - {"PSV": {"Voice": "Pass"}}
    - {"EA": {"Voice": "AgFoc"}}
    - {"DIR": {"PartType": "Dir"}}
    - {"F": {"PronType": "Art", "Definite": "Spec"}}

rules:
  - name: punctuation
    match:
      regex: "^[.!?¡\"¿—]$"
    set:
      upos: "PUNCT"

  - name: tik_dem
    match:
      in_list: ["tik"]
    set:
      upos: "DET"
      feats: {"PronType": "Dem"}

  - name: chi_dist
    match:
      in_list: ["chi'"]
    set:
      upos: "DET"
      feats: {"PronType": "Dem", "Deixis": "Dist"}

  - name: directional_particles
    match:
      gloss:
        in_list: ["DIR", "DIR.acá", "DIR.hacia", "DIR.hacia.acá"]
    set:
      upos: "PART"
      feats: {"PartType": "Dir"}
