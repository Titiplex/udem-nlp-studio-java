gloss_map:
  pos:
    - DIR: PART
    - PREP: ADP
    - ADV: ADV
    - Pro3: DET
    - CLF: DET
    - NUM: NUM
    - APV: PART
    - DIST: DET
    - DST: DET
    - SR: ADP
    - EXIST: PART
    - ÉNF: PART
    - ENF: PART
    - COMP: SCONJ
    - NEX: SCONJ
    - COND: SCONJ
    - INTJ: INTJ
    - VI: VERB
    - VT: VERB
  feats:
    - PFV:
        Aspect: Perf
    - IPFV:
        Aspect: Imp
    - NEG:
        Polarity: Neg
    - PL:
        Number: Plur
    - PL.hum:
        Number: Plur
        Animacy: Hum
    - DIST:
        PronType: Dem
    - PROX:
        PronType: Dem
    - VI:
        VerbForm: Fin
        SubCat: Intrans
    - VT:
        VerbForm: Fin
        SubCat: Trans
    - SEC:
        Mood: Seq
    - PRSP:
        Aspect: Prosp
    - PSV:
        Voice: Pass
    - PAS.PFV:
        Voice: Pass
        Aspect: Perf
    - EA:
        Voice: AgFoc
    - FA:
        Voice: Act
    - DIR:
        PartType: Dir
    - F:
        PronType: Art
        Definite: Spec
    - A1SG:
        Pers[subj]: "1"
        Number[subj]: Sing
    - A1PL:
        Pers[subj]: "1"
        Number[subj]: Plur
    - A2SG:
        Pers[subj]: "2"
        Number[subj]: Sing
    - A2PL:
        Pers[subj]: "2"
        Number[subj]: Plur
    - A3:
        Pers[subj]: "3"
        Number[subj]: Sing
    - A3PL:
        Pers[subj]: "3"
        Number[subj]: Plur
    - B1SG:
        Pers[obj]: "1"
        Number[obj]: Sing
    - B1PL:
        Pers[obj]: "1"
        Number[obj]: Plur
    - B2SG:
        Pers[obj]: "2"
        Number[obj]: Sing
    - B2PL:
        Pers[obj]: "2"
        Number[obj]: Plur
    - B3:
        Pers[obj]: "3"
        Number[obj]: Sing
    - B3PL:
        Pers[obj]: "3"
        Number[obj]: Plur

rules:
  - name: punctuation
    match:
      gloss:
        regex: '^[.!?¡"¿—]$'
    set:
      upos: PUNCT

  - name: pron_from_agreement
    match:
      gloss:
        regex: '(?i).*(A[123](SG|PL)?|B[123](SG|PL)?).*'
    set:
      upos: PRON

  - name: tik_demonstrative
    match:
      gloss:
        regex: '(?i).*(PROX|DIST).*'
    set:
      upos: DET

  - name: classifier_determiner
    match:
      gloss:
        regex: '(?i).*CLF.*'
    set:
      upos: DET

  - name: obvious_verbs
    match:
      gloss:
        regex: '(?i).*(VI|VT|PAS\.PFV|PSV|EA|FA).*'
    set:
      upos: VERB
