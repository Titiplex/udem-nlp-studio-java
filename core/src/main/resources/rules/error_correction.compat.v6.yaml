rules:
  - id: clean_chars
    rewrite:
      delete:
        type: chars
        chars: ["[", "]", "_", "="]

  - id: clean_null_part
    rewrite:
      delete:
        type: part
        chars: ["ø"]

  - id: norm_prsp
    rewrite:
      match:
        gloss: ["FUT", "PROSP"]
      gloss:
        before: ["FUT", "PROSP"]
        after: ["PRSP"]

  - id: norm_pfv
    rewrite:
      match:
        gloss: ["COMP", "CP"]
      gloss:
        before: ["COMP", "CP"]
        after: ["PFV"]

  - id: norm_ipfv
    rewrite:
      match:
        gloss: ["HAB", "PRES"]
      gloss:
        before: ["HAB", "PRES"]
        after: ["IPFV"]

  - id: norm_prox
    rewrite:
      match:
        gloss: ["PRX"]
      gloss:
        before: ["PRX"]
        after: ["PROX"]

  - id: norm_clf
    rewrite:
      match:
        gloss: ["CLSF", "Pro3"]
      gloss:
        before: ["CLSF", "Pro3"]
        after: ["CLF"]

  - id: norm_nmlz
    rewrite:
      match:
        gloss: ["nmz.t"]
      gloss:
        before: ["nmz.t"]
        after: ["nmlz"]

  - id: norm_vi
    rewrite:
      match:
        gloss: ["INTR"]
      gloss:
        before: ["INTR"]
        after: ["VI"]

  - id: norm_vt
    rewrite:
      match:
        gloss: ["TR"]
      gloss:
        before: ["TR"]
        after: ["VT"]

  - id: norm_clf_num
    rewrite:
      match:
        gloss: ["CNUM"]
      gloss:
        before: ["CNUM"]
        after: ["CLF.NUM"]

  - id: bueno_to_bweno
    rewrite:
      match:
        gloss: ["bueno"]
      gloss:
        before: ["bueno"]
        after: ["bweno"]

  - id: dem_tik_to_prox
    rewrite:
      match:
        gloss: ["DEM"]
        tokens:
          isword: ["tik"]
      gloss:
        before: ["DEM"]
        after: ["PROX"]

  - id: dem_chi_to_dist
    rewrite:
      match:
        gloss: ["DEM"]
        tokens:
          isword: ["chi'"]
      gloss:
        before: ["DEM"]
        after: ["DIST"]

  - id: neg_maj_to_pfv
    rewrite:
      match:
        gloss: ["NEG"]
        tokens:
          isword: ["maj"]
      gloss:
        before: ["NEG"]
        after: ["PFV"]

  - id: nex_to_to_comp
    rewrite:
      match:
        gloss: ["NEX"]
        tokens:
          isword: ["to"]
      gloss:
        before: ["NEX"]
        after: ["COMP"]

  - id: adv_rct_ta_to_dir_hacia
    rewrite:
      match:
        gloss: ["ADV", "RCT"]
        tokens:
          any: ["ta'", "ta"]
      gloss:
        before: ["ADV", "RCT"]
        after: ["DIR.hacia"]

  - id: tik_tik_intj
    rewrite:
      match:
        tokens:
          - ["tik", "tik"]
      gloss:
        before: ["PROX", "PROX"]
        after: ["INTJ", "INTJ"]

  - id: tik_tik_merge
    merge:
      match:
        tokens:
          - ["tik", "tik"]
    rewrite:
      match:
        tokens:
          isword: ["tik-tik"]
        gloss: ["INTJ-INTJ"]
      before: ["tik-tik"]
      after: ["tiktik"]
      gloss:
        before: ["INTJ-INTJ"]
        after: ["INTJ"]

  - id: ppf_pas_nak_to_pfv
    rewrite:
      match:
        tokens:
          any: ["nak"]
        gloss: ["PPF", "PAS"]
      gloss:
        before: ["PPF", "PAS"]
        after: ["PFV"]

  - id: top_enf_ha_to_enf
    rewrite:
      match:
        tokens:
          isword: ["ha", "a"]
        gloss: ["TOP", "ENF", "ÉNF"]
      before: ["ha", "a"]
      after: ["ha"]
      gloss:
        before: ["TOP", "ENF", "ÉNF"]
        after: ["ENF"]

  - id: sr_et_to_sr_con
    rewrite:
      match:
        tokens:
          any: ["et'"]
        gloss: ["SR"]
      gloss:
        before: ["SR"]
        after: ["SR.con"]

  - id: sr_yik_to_sr_para
    rewrite:
      match:
        tokens:
          any: ["yik"]
        gloss: ["SR"]
      before: ["yik"]
      after: ["ik"]
      gloss:
        before: ["SR"]
        after: ["SR.para"]

  - id: sr_uj_to_sr_por
    rewrite:
      match:
        tokens:
          any: ["uj"]
        gloss: ["SR"]
      gloss:
        before: ["SR"]
        after: ["SR.por"]

  - id: clf_num_wan_to_anim
    rewrite:
      match:
        tokens:
          any: ["wan"]
        gloss: ["CLF.NUM"]
      before: ["wan"]
      after: ["wanh"]
      gloss:
        before: ["CLF.NUM"]
        after: ["CLF.NUM.ANIM"]

  - id: clf_num_e_to_inan
    rewrite:
      match:
        tokens:
          any: ["e'"]
        gloss: ["CLF.NUM"]
      gloss:
        before: ["CLF.NUM"]
        after: ["CLF.NUM.INAN"]

  - id: clf_winh_to_m
    rewrite:
      match:
        tokens:
          any: ["winh"]
        gloss: ["CLF"]
      gloss:
        before: ["CLF"]
        after: ["CLF.M"]

  - id: dir_kot_to_hacia_aca
    rewrite:
      match:
        tokens:
          any: ["kot"]
        gloss: ["DIR", "DIR.acá"]
      gloss:
        before: ["DIR", "DIR.acá"]
        after: ["DIR.hacia.acá"]

  - id: clf_ix_to_f
    rewrite:
      match:
        tokens:
          any: ["ix"]
        gloss: ["CLF"]
      gloss:
        before: ["CLF"]
        after: ["CLF.F"]
