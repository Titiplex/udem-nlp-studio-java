rules:
  - id: clean_chars
    rewrite:
      delete:
        type: chars
        chars: ["[", "]", "_", "="]

  - id: clean_null_part
    rewrite:
      delete:
        type: part
        chars: ["ø"]

  - id: normalize_pronouns
    rewrite:
      match:
        tokens:
          - ["a", "tik"]
          - ["ha", "tik"]
      between:
        length: 1
      before: ["a", "ha"]
      after: "ha'"

  - id: merge_pronouns
    merge:
      match:
        tokens:
          - ["ha'", "in"]
          - ["ha'", "ach"]
          - ["ha'", "onh"]
          - ["ha'", "ex"]

  - id: b1_in_to_hin
    rewrite:
      match:
        gloss: ["B1"]
        tokens:
          startswith: ["in"]
      insert:
        segment: "h"
        token: 1
        position: 1

  - id: add_h_adjective_prefix_like
    rewrite:
      match:
        gloss:
          starts_with: ["A1", "A2", "A3", "B1", "B2", "B3"]
        tokens:
          startswith_vowel: true
      insert:
        segment: "h"
        token: 1
        position: 1

  - id: rewrite_bo_spanish_verb
    rewrite:
      match:
        gloss: "spanish_verb"
        tokens:
          isword: ["b'o"]
      before: ["b'o"]
      after: "b'o'"

  - id: merge_any_xo
    merge:
      match:
        tokens: ["_", "xo"]

  - id: split_directionals
    rewrite:
      match:
        gloss: "spanish_verb"
        tokens:
          endswith: ["el", "kot", "k'och", "kan", "och", "ek", "em", "k'e'", "b'at", "hul", "ul", "ta'"]
      split:
        type: end
        tokens: ["el", "kot", "k'och", "kan", "och", "ek", "em", "k'e'", "b'at", "hul", "ul", "ta'"]

  - id: ix_to_ix_apostrophe_before_vowel_initial_verb
    rewrite:
      match:
        tokens: ["ix", "_"]
        chuj:
          side: "j"
          root_from_gloss: "spanish_verb"
          root_startswith_vowel: true
      targets: "i"
      before: ["ix"]
      after: "ix'"

  - id: normalize_i_to_hi
    rewrite:
      regex_sub:
        scope: chuj
        pattern: "^i+$"
        repl: "hi"
