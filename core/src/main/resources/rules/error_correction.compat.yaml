rules:
  - id: clean_chars
    rewrite:
      delete:
        type: chars
        chars: ["[", "]", "_", "="]

  - id: clean_null_part
    rewrite:
      delete:
        type: part
        chars: ["ø"]

  - id: normalize_prsp
    rewrite:
      gloss:
        before: ["FUT", "PROSP"]
        after: ["PRSP", "PRSP"]

  - id: normalize_pfv
    rewrite:
      gloss:
        before: ["COMP", "CP"]
        after: ["PFV", "PFV"]

  - id: normalize_ipfv
    rewrite:
      gloss:
        before: ["HAB", "PRES"]
        after: ["IPFV", "IPFV"]

  - id: normalize_prox
    rewrite:
      gloss:
        before: ["PRX", "DEM"]
        after: ["PROX", "PROX"]

  - id: normalize_dist
    rewrite:
      gloss:
        before: ["DST"]
        after: ["DIST"]

  - id: normalize_clf
    rewrite:
      gloss:
        before: ["CLSF", "Pro3"]
        after: ["CLF", "CLF"]

  - id: normalize_nmlz
    rewrite:
      gloss:
        before: ["nmz.t"]
        after: ["nmlz"]

  - id: normalize_vi
    rewrite:
      gloss:
        before: ["INTR"]
        after: ["VI"]

  - id: normalize_vt
    rewrite:
      gloss:
        before: ["TR"]
        after: ["VT"]

  - id: normalize_clf_num
    rewrite:
      gloss:
        before: ["CNUM"]
        after: ["CLF.NUM"]

  - id: bueno_bweno
    rewrite:
      gloss:
        before: ["bueno"]
        after: ["bweno"]

  - id: normalize_pf_and_passive
    rewrite:
      gloss:
        before: ["PVPF", "PPT"]
        after: ["PAS.PFV", "PAS.PFV"]

  - id: normalize_neg_pfv
    rewrite:
      gloss:
        before: ["NEG-PFV"]
        after: ["NEG.PFV"]

  - id: normalize_neg_ipfv
    rewrite:
      gloss:
        before: ["NEG-IPFV"]
        after: ["NEG.IPFV"]

  - id: normalize_fa
    rewrite:
      gloss:
        before: ["EA"]
        after: ["FA"]

  - id: add_sg_a1
    rewrite:
      gloss:
        before: ["A1"]
        after: ["A1SG"]

  - id: add_sg_b1
    rewrite:
      gloss:
        before: ["B1"]
        after: ["B1SG"]

  - id: add_sg_a2
    rewrite:
      gloss:
        before: ["A2"]
        after: ["A2SG"]

  - id: add_sg_b2
    rewrite:
      gloss:
        before: ["B2"]
        after: ["B2SG"]

  - id: normalize_iiii
    rewrite:
      regex_sub:
        scope: chuj
        pattern: '^i+$'
        repl: 'hi'
