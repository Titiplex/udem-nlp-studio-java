rules:
  - id: clean_chars
    rewrite:
      delete:
        type: chars
        chars: ["[", "]", "_", "="]

  - id: clean_null_part
    rewrite:
      delete:
        type: part
        chars: ["ø"]

  - id: normalize_basic_glosses
    rewrite:
      gloss:
        before: ["FUT", "PROSP", "COMP", "CP", "HAB", "PRES", "PRX", "CLSF", "Pro3", "nmz.t", "INTR", "TR", "CNUM", "bueno"]
        after:  ["PRSP","PRSP","PFV","PFV","IPFV","IPFV","PROX","CLF","CLF","nmlz","VI","VT","CLF.NUM","bweno"]

  - id: dem_tik_to_prox
    rewrite:
      match:
        gloss: "DEM"
        tokens:
          isword: ["tik"]
      gloss:
        before: ["DEM"]
        after: ["PROX"]

  - id: dem_chi_to_dist
    rewrite:
      match:
        gloss: "DEM"
        tokens:
          isword: ["chi'"]
      gloss:
        before: ["DEM"]
        after: ["DIST"]

  - id: neg_maj_to_pfv
    rewrite:
      match:
        gloss: "NEG"
        tokens:
          isword: ["maj"]
      gloss:
        before: ["NEG"]
        after: ["PFV"]

  - id: fuse_tik_tik
    merge:
      match:
        tokens:
          - ["tik", "tik"]
    rewrite:
      match:
        tokens:
          isword: ["tik-tik"]
      before: ["tik-tik"]
      after: ["tiktik"]
      gloss:
        before: ["PROX-PROX", "INTJ-INTJ"]
        after: ["INTJ", "INTJ"]

  - id: normalize_pronouns_ha_tik
    merge:
      match:
        tokens:
          - ["ha'", "in"]
          - ["ha'", "ach"]
          - ["ha'", "onh"]
          - ["ha'", "ex"]
    rewrite:
      match:
        tokens:
          - ["a", "tik"]
          - ["ha", "tik"]
      before: ["a", "ha"]
      after: ["ha'"]

  - id: add_h_before_vowel_initial_agreement_forms
    rewrite:
      match:
        gloss:
          starts_with: ["A1", "A2", "A3", "B1", "B2", "B3"]
        tokens:
          startswith_vowel: true
      insert:
        segment: "h"
        token: 1
        position: 1

  - id: normalize_specific_spellings
    rewrite:
      before: ["ixaji", "axo", "b'o", "tz-aj", "mach-ek'-el", "b'ian", "man", "lanh", "ha-to"]
      after:  ["ix'aji", "haxo", "b'o'", "tz'-aj", "mach-ek-el", "b'i'an", "manh", "lan", "hato"]

  - id: normalize_agreement_glosses
    rewrite:
      gloss:
        before: ["A1", "B1", "A2", "B2"]
        after: ["A1SG", "B1SG", "A2SG", "B2SG"]

  - id: merge_common_bigrams
    merge:
      match:
        tokens:
          - ["_", "xo"]
          - ["_", "laj"]
          - ["b'o'", "x-ok"]
          - ["et'", "b'ey-um"]
          - ["tzak", "_"]
          - ["t'ay", "in"]
          - ["t'ay", "och"]
          - ["t'ay", "onh"]
          - ["t'ay", "ex"]
          - ["tas", "am"]
          - ["xschi'", "winh"]
          - ["olin", "b'at"]
          - ["ixonh", "b'at"]
          - ["olex", "b'at"]
          - ["tzin", "b'at"]

  - id: split_directionals
    rewrite:
      split:
        type: end
        tokens: ["el", "kot", "k'och", "kan", "och", "ek", "em", "k'e'", "b'at", "hul", "ul", "ta'"]

  - id: normalize_iiii_to_hi
    rewrite:
      regex_sub:
        scope: chuj
        pattern: "^i+$"
        repl: "hi"
